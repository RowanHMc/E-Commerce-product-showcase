<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workshop Tools</title>
    <link rel="stylesheet" href="css\style.css">

</head>
<body></body>
<header>
    <input type="checkbox" class="theme-switch" class="hidden-checkbox">

<header>
    <h1>Workshop Tools</h1>

    <label for="theme-switch" class="theme-label">
        Toggle Dark Mode
    </label>
</header>

<br></br>
<Section class="product-showcase">
    <div class="product-grid">
        <article class="product-card">
            <img src="assets\Ball point Hammer.jpg" alt="Product" />
            <h3>Ball-Point Hammer</h3>
            <p class="price">$5.50</p>
            <div class="rating">★★★★★</div>
            <button class="add-btn">Add to Cart</button>
        </article>
        <article class="product-card">
            <img src="assets\drills.jpg" alt="Product" />
            <h3>Drills</h3>
            <p class="price">$50.00</p>
            <div class="rating">★★★★★</div>
            <button class="add-btn">Add to Cart</button>
        </article>
        <article class="product-card">
            <img src="assets\handsaw.jpg" alt="Product" />
            <h3>Handsaw</h3>
            <p class="price">$35.00</p>
            <div class="rating">★★★★☆</div>
            <button class="add-btn">Add to Cart</button>
        </article>
        <article class="product-card">
            <img src="assets\Machete.jpg" alt="Product" />
            <h3>Machetes</h3>
            <p class="price">$15.00</p>
            <div class="rating">★★★★☆</div>
            <button class="add-btn">Add to Cart</button>
        </article>
        <article class="product-card">
            <img src="assets\Nailgun.jpg" alt="Product" />
            <h3>Nailgun</h3>
            <p class="price">$65.00</p>
            <div class="rating">★★★★☆</div>
            <button class="add-btn">Add to Cart</button>
        </article>
        <article class="product-card">
            <img src="assets\Toolbox.jpg" alt="Product" />
            <h3>Toolbox</h3>
            <p class="price">$18.00</p>
            <div class="rating">★★★★☆</div>
            <button class="add-btn">Add to Cart</button>
        </article>
    </div>
</Section>
<br></br>
<aside class="cart-sidebar">
    <h2>Shopping Cart</h2>
    <p>Your cart is empty.</p>
</aside>
<br></br>

</body>

</html>
